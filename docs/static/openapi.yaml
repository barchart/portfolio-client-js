  /portfolios/{portfolio}/positions/{position}/transactions-formatted:
    get:
      summary: Returns formatted transactions.
      description: Returns transactions whose values are suitable for display.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position-or-wildcard'
        - name: start
          in: query
          required: false
          description: Start date for the formatted transaction query.
          schema:
            type: string
            format: date
            example: '2026-01-01'
        - name: end
          in: query
          required: false
          description: End date for the formatted transaction query.
          schema:
            type: string
            format: date
            example: '2026-05-28'
        - name: page
          in: query
          required: false
          description: If true, reads a single page of formatted transactions.
          schema:
            type: boolean
            example: true
        - name: sequence
          in: query
          required: false
          description: The starting sequence number for a formatted transaction page.
          schema:
            type: number
            example: 1
        - name: count
          in: query
          required: false
          description: The maximum number of formatted transactions to return.
          schema:
            type: number
            example: 25
        - name: descending
          in: query
          required: false
          description: If true, results are returned in descending sequence order.
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: An array of formatted transactions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/transaction-formatted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

