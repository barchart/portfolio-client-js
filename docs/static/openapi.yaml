openapi: 3.0.1

info:
  title: Barchart Portfolio API
  description: Barchart Portfolio API
  version: 3.8.1
  contact:
    name: Barchart Support
    url: https://help.barchart.com/support/home
    email: support@barchart.com

components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Authorization failure.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthorized

    SchemaError:
      description: Input invalid
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                value:
                  type: object
                  properties:
                    code:
                      type: string
                      example: SCHEMA_VALIDATION_FAILURE
                    message:
                      type: string
                      example: An attempt to read CREATE data failed (found \"timezone\" when expecting \"name\").
                children:
                  type: array
                  example: []
                  items: {}

    ServerError:
      description: Server error.
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                value:
                  type: object
                  properties:
                    code:
                      type: string
                      example: REQUEST_GENERAL_FAILURE
                    message:
                      type: string
                      example: An attempt to create a portfolio failed for unspecified reason(s).
                children:
                  type: array
                  example: []
                  items: {}

  parameters:
    portfolio:
      name: portfolio
      in: path
      required: true
      description: The identifier of the portfolio.
      schema:
        type: string
        format: uuid
        example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3

    portfolio-or-wildcard:
      name: portfolio
      in: path
      required: true
      description: The identifier of the portfolio. Use an asterisk (*) to retrieve data across all portfolios.
      schema:
        type: string
        example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3

    position:
      name: position
      in: path
      required: true
      description: The identifier of the position.
      schema:
        type: string
        format: uuid
        example: 96af2dc6-2236-4a82-84c2-bff969389e00

    position-or-wildcard:
      name: position
      in: path
      required: true
      description: The identifier of the position. Use an asterisk (*) to retrieve data across all positions.
      schema:
        type: string
        example: 96af2dc6-2236-4a82-84c2-bff969389e00

    sequence:
      name: sequence
      in: path
      required: true
      description: The sequence number of the transaction.
      schema:
        type: number
        example: 1

    sequence-or-wildcard:
      name: sequence
      in: path
      required: true
      description: The sequence number of the transaction. Use an asterisk (*) to retrieve all transactions for the position.
      schema:
        type: string
        example: '1'

  schemas:
    portfolio:
      type: object
      properties:
        user:
          type: string
          description: The identifier for the portfolio's owner.
          format: uuid
          example: ad4b0bd3-b5e1-4f7d-96b1-54d22d99960d
        portfolio:
          type: string
          description: The portfolio identifier (assigned by the backend).
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        name:
          type: string
          description: The name of the portfolio.
          example: My First Portfolio
        timezone:
          type: string
          description: The timezone of the portfolio. Must conform to a tz database name.
          format: tz_database_name
          example: America/New_York
        defaults:
          $ref: '#/components/schemas/portfolio-defaults'
          description: Default settings for the portfolio.
      required:
        - portfolio
        - user
        - name
        - timezone
        - defaults

    portfolio-create:
      type: object
      properties:
        name:
          type: string
          description: The name of the portfolio.
          example: My First Portfolio
        timezone:
          type: string
          description: The timezone of the portfolio. Must conform to a tz database name.
          format: tz_database_name
          example: America/New_York
        defaults:
          $ref: '#/components/schemas/portfolio-defaults'
          description: Default settings for the portfolio.
      required:
        - name
        - timezone
        - defaults

    portfolio-update:
      type: object
      properties:
        portfolio:
          type: string
          description: The identifier of the portfolio to update.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        name:
          type: string
          description: The updated name of the portfolio, if present.
          example: My Other Portfolio
        timezone:
          type: string
          description: The updated timezone for the portfolio, if present.
          format: tz_database_name
          example: America/Chicago
        defaults:
          $ref: '#/components/schemas/portfolio-defaults'
          description: The updated default settings for the portfolio, if present.
      required:
        - portfolio

    portfolio-defaults:
      type: object
      properties:
        cash:
          type: boolean
          description: Indicates if corresponding cash transactions should be automatically be created for investment transactions (e.g. a DEBIT transaction in a cash positions corresponding to a BUY transaction for a stock).
          example: true
        currency:
          type: string
          $ref: '#/components/schemas/enum-currency'
          description: The default currency for the portfolio, used to determine the basis for reporting.
        reinvest:
          type: boolean
          description: Indicates if dividends should be automatically reinvested.
          example: true
      required:
        - cash
        - currency
        - reinvest

    position:
      type: object
      properties:
        user:
          type: string
          description: The identifier of the position's owner.
          format: uuid
          example: ad4b0bd3-b5e1-4f7d-96b1-54d22d99960d
        portfolio:
          type: string
          description: The identifier of the portfolio which contains the position.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        instrument:
          $ref: '#/components/schemas/position-instrument'
          description: The position's instrument.
        position:
          type: string
          description: The identifier for the position.
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        transaction:
          type: string
          description: The sequence number of the most recent transaction for the position.
          format: number
          example: 42
        cash:
          type: boolean
          description: Indicates if corresponding cash transactions should be created, when appropriate (e.g. also DEBIT cash when creating a BUY transaction for stock).
          example: true
        reinvest:
          type: boolean
          description: Indicates if dividends should be automatically reinvested.
          example: true
        snapshot:
          $ref: '#/components/schemas/position-snapshot'
          description: Summary and performance information for the position, as of the last transaction.
      required:
        - user
        - portfolio
        - instrument
        - position
        - transaction
        - cash
        - reinvest
        - snapshot

    position-update:
      type: object
      properties:
        portfolio:
          type: string
          description: The identifier of the portfolio containing the position to update.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        position:
          type: string
          description: The identifier of the position to update.
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        cash:
          type: boolean
          description: If present, changes the setting for automatic creation of the cash transactions (based on investment transactions).
          example: true
        reinvest:
          type: boolean
          description: If present, changes whether future dividends are re-invested.
          example: true
      required:
        - portfolio
        - position

    position-instrument:
      type: object
      properties:
        id:
          type: string
          description: The identifier for the instrument.
          format: uuid
          example: c6471c5f-48d4-4979-8dd7-56c5ff1439c7
        name:
          type: string
          description: The name of the instrument.
          example: Apple Inc
        type:
          $ref: '#/components/schemas/enum-instrument-type'
          description: The asset class of the instrument.
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The currency the instrument trades in.
        symbol:
          $ref: '#/components/schemas/misc-symbols'
          description: Symbols used to identify the instrument.
      required:
        - id
        - name
        - type
        - currency
        - symbol

    position-snapshot:
      type: object
      properties:
        date:
          type: string
          description: The date of the snapshot (YYYY-MM-DD).
          format: date
          example: '2022-01-13'
        open:
          type: string
          description: The number of shares (units) open (a decimal-formatted string, value may be negative).
          example: '100'
        direction:
          $ref: '#/components/schemas/enum-position-direction'
          description: Qualifies the number of open shares as LONG (i.e. positive), short (i.e. negative), or EVEN (i.e. zero).
        buys:
          type: string
          description: The sum of all purchases in the currency of the underlying instrument (a decimal-formatted string, value is never negative).
          example: '-18256'
        sells:
          type: string
          description: The sum of all sales in the currency of the underlying instrument (a decimal-formatted string, value is never negative).
          example: '0'
        gain:
          type: string
          description: The realized gain on the position (a decimal-formatted string, value may be negative).
          example: '0'
        basis:
          type: string
          description: The amount invested in the remaining position (a decimal-formatted string, value may be negative).
          example: '0'
        income:
          type: string
          description: The sum of all income (e.g. dividends) earned on the position (a decimal-formatted string, value may be negative).
          example: '22'
        value:
          type: string
          description: The current value of the position (a decimal-formatted string, value is never negative). Valuation is based on the last transaction price (not the current market price).
          example: '18256'
      required:
        - date
        - open
        - direction
        - buys
        - sells
        - gain
        - basis
        - income
        - value

    transaction:
      type: object
      properties:
        portfolio:
          type: string
          description: The identifier of the portfolio which contains the transaction.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        position:
          type: string
          description: The identifier of the position which contains the transaction.
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        transaction:
          type: string
          description: The identifier of the transaction.
          format: uuid
          example: b3bb28ee-a24c-4b8b-8b3b-8ad5b5b0b00a
        sequence:
          type: number
          example: 42
          example: 42
          description: The sequence number of the transaction (with respect to other transactions for the same position, starts with one).
          example: 1
        type:
          $ref: '#/components/schemas/enum-transaction-type'
          description: The type of transaction.
        date:
          type: string
          description: The date of the transaction (YYYY-MM-DD).
          format: date
          example: '2020-08-30'
        description:
          type: string
          description: Autogenerated text describing the transaction (used for cash positions).
          example: Buy 100 AAPL
        amount:
          type: string
          description: The total amount of money affected by the transaction (decimal-fomratted string). In cases where money was paid, the value is negative. In cases where money was received, the value is positive.
          example: '-18256'
        quantity:
          type: string
          description: The number of shares (or units) of the position's instrument affected by the transaction (decimal-fomratted string). The value will be positive when purchasing and negative when selling.
          example: '100'
        fee:
          type: string
          description: A fee paid to execute the transaction (decimal-fomratted string).
          example: '9.99'
        reference:
          $ref: '#/components/schemas/transaction-reference'
          description: A reference to another transaction — a transaction which caused this transaction to occur.
        snapshot:
          $ref: '#/components/schemas/position-snapshot'
          description: A summary of the position size and performance, immediately after this transaction was executed.
        trade:
          $ref: '#/components/schemas/transaction-extension-for-trade'
          description: Additional information, only present if transaction is a trade (type is B, S, SS, etc).
        dividend:
          $ref: '#/components/schemas/transaction-extension-for-dividend'
          description: Additional information, only present if transaction is a dividend (type is DV, DX, DF, DY, etc).
        split:
          $ref: '#/components/schemas/transaction-extension-for-split'
          description: Additional information, only present if transaction is a split (type is SP).
      required:
        - portfolio
        - position
        - transaction
        - sequence
        - type
        - date
        - amount
        - quantity
        - snapshot

    transaction-reference:
      type: object
      properties:
        position:
          type: string
          description: The identifier of the referenced position.
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        transaction:
          type: string
          description: The identifier of the referenced transaction.
          format: uuid
          example: b3bb28ee-a24c-4b8b-8b3b-8ad5b5b0b00a
      required:
        - position
        - transaction

    transaction-extension-for-trade:
      type: object
      properties:
        price:
          type: string
          description: The unit price the transaction was executed at (decimal-fomratted string).
          example: '182.56'
      required:
        - price

    transaction-extension-for-dividend:
      type: object
      properties:
        rate:
          type: string
          description: The amount paid per unit (decimal-fomratted string).
          example: '0.125'
        effective:
          type: string
          description: The day (YYYY-MM-DD) used to determine the quantity eligible to receive the dividend (i.e. the dividend ex-date).
          format: date
          example: '2020-08-30'
        price:
          type: string
          description: The market value of the underlying at the time the dividend was paid, used to calculate reinvestment quantities (decimal-fomratted string).
          example: '499.23'
        amount:
          type: string
          description: The amount of the dividend (e.g the rate multiplied by the quantity eligible to receive the dividend, as a decimal-fomratted string).
          example: '12.50'
      required:
        - rate
        - effective
        - amount

    transaction-extension-for-split:
      type: object
      properties:
        numerator:
          type: string
          description: The numerator in the following fraction [ shares owned after dividend ] / [ shares owned before dividend ] (decimal-fomratted string).
          example: '4'
        denominator:
          type: string
          description: The denominator in the following fraction [ shares owned after dividend ] / [ shares owned before dividend ] (decimal-fomratted string).
          example: '1'
        effective:
          type: string
          description: The day (YYYY-MM-DD) used to determine the quantity eligible to receive the dividend (i.e. the split ex-date).
          format: date
          example: '2020-08-30'
      required:
        - numerator
        - denominator
        - effective

    transaction-create:
      type: object
      properties:
        portfolio:
          type: string
          description: The portfolio identifier (assigned by the backend).
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        position:
          type: string
          description: The position identifier (or use \"new\" to create a new position).
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        type:
          $ref: '#/components/schemas/enum-transaction-create-type'
          description: The type of transaction to create.
        instrument:
          $ref: '#/components/schemas/transaction-create-instrument'
          description: Information about the instrument (required when opening a new position, ignored otherwise).
        date:
          type: string
          description: The day of the transaction (YYYY-MM-DD).
          format: date
          example: '2022-01-13'
        price:
          type: string
          description: The unit price of the instrument at the time the transaction executes (decimal-fomratted string).
          example: '123.45'
        quantity:
          type: string
          description: The number of units affected by the transaction (decimal-fomratted string).
          example: '100'
        fee:
          type: string
          description: A fee paid to execute the transaction (decimal-fomratted string).
          example: '9.99'
      required:
        - portfolio
        - position
        - type
        - date
        - quantity

    transaction-create-instrument:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/misc-symbols'
          description: Symbols used to identify the target instrument.
      required:
        - symbol

    transaction-mutate-result:
      type: object
      properties:
        positions:
          $ref: '#/components/schemas/transaction-mutate-result-positions'
          description: Positions which were affected by a transaction (create, update, or delete) operation.
      required:
        - positions

    transaction-mutate-result-positions:
      type: object
      properties:
        saved:
          type: array
          description: All positions which were created or updated.
          items:
            $ref: '#/components/schemas/position'
        deleted:
          type: array
          description: All positions which were deleted.
          items:
            $ref: '#/components/schemas/position'
      required:
        - saved
        - deleted

    misc-symbols:
      type: object
      properties:
        barhcart:
          type: string
          description: The symbol used by Barchart (required to lookup quotes and determine prices).
          example: AAPL
        display:
          type: string
          description: The symbol used for display purposes (often the same as the Barchart symbol).
          example: AAPL
      required:
        - barhcart

    misc-valuation-container:
      type: object
      properties:
        user:
          type: string
          description: The identifier of the portfolio's owner.
          format: uuid
          example: ad4b0bd3-b5e1-4f7d-96b1-54d22d99960d
        portfolio:
          type: string
          description: The portfolio identifier.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        position:
          type: string
          description: The position identifier (an asterisk (*) indicates the valuation are for the entire portfolio).
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The currency of the valuations (absent if no valuations are available).
        valuations:
          type: array
          description: Daily valuations for the position (or the entire portfolio).
          items:
            $ref: '#/components/schemas/misc-valuation'
      required:
        - user
        - portfolio
        - position
        - valuations

    misc-valuation:
      type: object
      properties:
        date:
          type: string
          description: The date of the valuation (YYYY-MM-DD).
          format: date
          example: '2020-08-30'
        market:
          type: number
          description: The market value of the position (or portfolio).
          example: 20924.08
      required:
        - date
        - market

    enum-currency:
      type: string
      description: Currencies used to trade and value instruments and positions.
      enum:
        - USD
        - CAD

    enum-instrument-type:
      type: string
      description: Codes which define asset classes for instruments.
      enum:
        - CASH
        - CRYPTO
        - EQUITY
        - EQUITY_OPTION
        - FUND
        - FUTURE
        - FUTURE_OPTION
        - OTHER

    enum-position-direction:
      type: string
      description: Codes which describe position size — positive values are LONG, negative values are SHORT and zero values are EVEN.
      enum:
        - LONG
        - SHORT
        - EVEN

    enum-transaction-type:
      type: string
      description: Single letter codes for transaction types (e.g. B for BUY, S for SELL; see \"Appendicies > Enumerations\" in SDK documentation for more info), including types which are managed by the backend (e.g. DV for dividend).
      enum:
        - B
        - S
        - BS
        - SS
        - DV
        - DX
        - DS
        - SP
        - F
        - FU
        - DL
        - MC
        - MO
        - SPF
        - SPFO
        - DC
        - DY
        - DF
        - D
        - W
        - DR
        - CR
        - V
        - I

    enum-transaction-create-type:
      type: string
      description: Single letter codes for transaction types (e.g. B for BUY, S for SELL; see \"Appendicies > Enumerations\" in SDK documentation for more info) which can be created by a consumer (this is a subset of the  "enum-transaction-type" component).
      enum:
        - B
        - S
        - BS
        - SS
        - F
        - D
        - W
        - V
        - I

    service-metadata:
      type: object
      properties:
        server:
          $ref: '#/components/schemas/service-metadata-server'
        user:
          $ref: '#/components/schemas/service-metadata-user'
        context:
          $ref: '#/components/schemas/service-metadata-context'

    service-metadata-context:
      type: object
      properties:
        id:
          type: string
          example: BARCHART

    service-metadata-server:
      type: object
      properties:
        name:
          type: string
          example: barchart/portfolio-private-api-main
        description:
          type: string
          example: API for Barchart Portfolio Service
        environment:
          type: string
          example: prod
        semver:
          type: string
          example: 5.6.1

    service-metadata-user:
      type: object
      properties:
        id:
          type: string
          example: me

    instrument:
      type: object
      description: Instrument resolution result.
      properties:
        id:
          type: string
          description: The identifier for the instrument.
          format: uuid
          example: c6471c5f-48d4-4979-8dd7-56c5ff1439c7
        name:
          type: string
          description: The name of the instrument.
          example: Apple Inc
        type:
          $ref: '#/components/schemas/enum-instrument-type'
          description: The asset class of the instrument.
        code:
          type: string
          description: The unit code used for price formatting, if present.
          example: equity
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The currency the instrument trades in.
        exchange:
          type: string
          description: The code of the listing exchange, if present.
          example: NASDAQ
        delist:
          type: string
          description: The delist date, if present.
          format: date
          example: '2026-05-28'
        future:
          $ref: '#/components/schemas/instrument-future'
          description: Futures contract metadata, if present.
        option:
          $ref: '#/components/schemas/instrument-option'
          description: Option contract metadata, if present.
        symbol:
          $ref: '#/components/schemas/misc-symbols'
          description: Symbols used to identify the instrument.
      required:
        - id
        - name
        - type
        - currency
        - symbol

    instrument-future:
      type: object
      properties:
        expiration:
          type: string
          description: The contract expiration date.
          format: date
          example: '2026-12-18'
        tick:
          type: string
          description: The minimum tick size.
          example: '0.25'
        value:
          type: string
          description: The value of the minimum tick.
          example: '12.50'

    instrument-option:
      type: object
      properties:
        expiration:
          type: string
          description: The option expiration date.
          format: date
          example: '2026-12-18'
        side:
          type: string
          description: The option side.
          enum:
            - CALL
            - PUT
        strike:
          type: string
          description: The option strike price.
          example: '200'
        multiplier:
          type: string
          description: The option contract multiplier.
          example: '100'
        tick:
          type: string
          description: The minimum tick size.
          example: '0.01'
        value:
          type: string
          description: The value of the minimum tick.
          example: '1'

    position-summary:
      type: object
      properties:
        user:
          type: string
          format: uuid
          example: 01748dd1-5d6d-4ae4-91b0-4e39e80c2b35
        portfolio:
          type: string
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        position:
          type: string
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        frame:
          $ref: '#/components/schemas/enum-position-summary-frame'
        start:
          $ref: '#/components/schemas/position-summary-point'
        end:
          $ref: '#/components/schemas/position-summary-point'
        period:
          $ref: '#/components/schemas/position-summary-period'
      required:
        - user
        - portfolio
        - position
        - frame
        - start
        - end
        - period

    position-summary-point:
      type: object
      properties:
        date:
          type: string
          format: date
          example: '2026-05-28'
        sequence:
          type: number
          example: 42
        open:
          type: string
          example: '100'
        direction:
          $ref: '#/components/schemas/enum-position-direction'
        basis:
          type: string
          example: '18256'
        value:
          type: string
          example: '19100'

    position-summary-period:
      type: object
      properties:
        buys:
          type: string
          example: '18256'
        sells:
          type: string
          example: '0'
        income:
          type: string
          example: '22'
        realized:
          type: string
          example: '0'
        unrealized:
          type: string
          example: '844'

    valuations-availability-result:
      type: object
      description: Availability of valuation data for a portfolio and its positions.
      properties:
        available:
          type: boolean
          description: If true, all position and portfolio valuations are up-to-date.
          example: true
        positions:
          type: array
          description: Position identifiers for valuations currently being calculated. An empty array indicates all position valuations are up-to-date.
          items:
            type: string
            format: uuid
            example: 96af2dc6-2236-4a82-84c2-bff969389e00
      required:
        - available
        - positions

    update-values-currency-result:
      type: object
      description: Result of a values currency recalculation request.
      properties:
        success:
          type: boolean
          description: Indicates the aggregate values were successfully recalculated.
          example: true
        userId:
          type: string
          description: The identifier of the authorized user whose values were recalculated.
          example: 01748dd1-5d6d-4ae4-91b0-4e39e80c2b35
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The currency code used for the recalculation.
      required:
        - success
        - userId
        - currency

    transaction-formatted:
      type: object
      description: Transaction values formatted for display.
      properties:
        instrument:
          $ref: '#/components/schemas/transaction-formatted-instrument'
          description: Instrument metadata used to format the transaction.
        raw:
          $ref: '#/components/schemas/transaction-formatted-raw'
          description: Raw numeric values corresponding to formatted display values.
        date:
          type: string
          description: The transaction date.
          format: date
          example: '2026-05-28'
        type:
          type: string
          description: The transaction type display name.
          example: Buy
        code:
          $ref: '#/components/schemas/enum-transaction-type'
          description: The transaction type code.
        sequence:
          type: number
          description: The sequence number of the transaction.
          example: 1
        position:
          type: string
          description: The identifier of the position containing the transaction.
          format: uuid
          example: 96af2dc6-2236-4a82-84c2-bff969389e00
        open:
          type: string
          description: The formatted number of shares or units open after the transaction.
          example: '100.00'
        transaction:
          type: string
          description: The identifier of the transaction.
          format: uuid
          example: b3bb28ee-a24c-4b8b-8b3b-8ad5b5b0b00a
        gain:
          type: string
          description: The formatted realized gain for the transaction, if present.
          example: '0.00'
        average:
          type: string
          description: The formatted average cost after the transaction, if present.
          example: '182.56'
        boughtSold:
          type: string
          description: The formatted quantity bought or sold by the transaction, if present.
          example: '100.00'
        price:
          type: string
          description: The formatted transaction price, rate, or valuation price, if present.
          example: '182.56'
        fee:
          type: string
          description: The formatted transaction fee, if present.
          example: '9.99'
        total:
          type: string
          description: The formatted total transaction amount, if present.
          example: '-18,265.99'
        ambiguous:
          type: boolean
          description: Indicates if the transaction was flagged as ambiguous by SnapTrade.
          example: false
        description:
          type: string
          description: The transaction description, if present.
          example: Buy 100 AAPL
        rate:
          type: string
          description: The formatted dividend, split, merger, or spinoff rate, if present.
          example: '0.125'
        shares:
          type: string
          description: The formatted share quantity used for dividend, split, merger, or spinoff display, if present.
          example: '100.00'
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The transaction currency, if present.
        native:
          type: string
          description: The formatted native currency amount, if present.
          example: '12.50'
      required:
        - instrument
        - raw
        - date
        - type
        - code
        - sequence
        - position
        - open
        - transaction

    transaction-formatted-instrument:
      type: object
      properties:
        name:
          type: string
          description: The instrument name.
          example: Apple Inc
        type:
          $ref: '#/components/schemas/enum-instrument-type'
          description: The asset class of the instrument.
        code:
          type: string
          description: The unit code used for price formatting, if present.
          example: equity
        currency:
          $ref: '#/components/schemas/enum-currency'
          description: The currency the instrument trades in.
        exchange:
          type: string
          description: The code of the listing exchange, if present.
          example: NASDAQ
        delist:
          type: string
          description: The delist date, if present.
          format: date
          example: '2026-05-28'
        future:
          $ref: '#/components/schemas/instrument-future'
          description: Futures contract metadata, if present.
        option:
          $ref: '#/components/schemas/instrument-option'
          description: Option contract metadata, if present.
        symbol:
          $ref: '#/components/schemas/misc-symbols'
          description: Symbols used to identify the instrument.

    transaction-formatted-raw:
      type: object
      properties:
        open:
          type: number
          description: Raw number of shares or units open after the transaction.
          example: 100
        gain:
          type: number
          description: Raw realized gain for the transaction, if present.
          example: 0
        average:
          type: number
          description: Raw average cost after the transaction, if present.
          example: 182.56
        total:
          type: number
          description: Raw total transaction amount, if present.
          example: -18265.99
        price:
          type: number
          description: Raw transaction price, rate, or valuation price, if present.
          example: 182.56
        boughtSold:
          type: number
          description: Raw quantity bought or sold by the transaction, if present.
          example: 100
        ambiguous:
          type: boolean
          description: Indicates if the transaction was flagged as ambiguous by SnapTrade.
          example: false
        rate:
          type: number
          description: Raw dividend, split, merger, or spinoff rate, if present.
          example: 0.125
        shares:
          type: number
          description: Raw share quantity used for dividend, split, merger, or spinoff display, if present.
          example: 100
        native:
          type: number
          description: Raw native currency amount, if present.
          example: 12.5

    brokerage-report-availability:
      type: object
      properties:
        start:
          type: string
          format: date
          example: '2026-01-01'
        end:
          type: string
          format: date
          example: '2026-03-31'
        frame:
          $ref: '#/components/schemas/enum-position-summary-frame'
      required:
        - start
        - end
        - frame

    snaptrade-brokerage:
      type: object
      description: SnapTrade brokerage and linked account metadata.
      properties:
        id:
          type: string
          description: The SnapTrade identifier for the brokerage.
          example: 0c1fc39b-0865-4ee2-bd21-551e9f9f866a
        name:
          type: string
          description: The name of the brokerage.
          example: barchart-brokerage
        display:
          type: string
          description: The name of the brokerage for display to a user.
          example: Barchart Brokerage
        logo:
          type: string
          description: The URI for the logo image for the brokerage.
          format: uri
          example: https://example.com/brokerage-logo.png
        connection:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/snaptrade-connection'
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/snaptrade-account'
      required:
        - id
        - name
        - display
        - logo
        - connection
        - accounts

    snaptrade-connect-instructions:
      type: object
      description: Instructions used to connect or reconnect a SnapTrade brokerage.
      properties:
        uri:
          type: string
          description: The URI for brokerage authentication.
          format: uri
          example: https://connect.snaptrade.com/session/147e7af9-f2fd-4e1d-b0c2-05059f03db89
      required:
        - uri

    snaptrade-connection:
      type: object
      description: Data regarding a connection to a SnapTrade brokerage.
      properties:
        id:
          type: string
          description: The SnapTrade identifier for the brokerage connection.
          example: 147e7af9-f2fd-4e1d-b0c2-05059f03db89
        broken:
          type: boolean
          description: Indicates if the user needs to authenticate again.
          example: false
      required:
        - id
        - broken

    snaptrade-account:
      type: object
      description: Data regarding a SnapTrade brokerage account.
      properties:
        id:
          type: string
          description: The SnapTrade identifier for the brokerage account.
          example: ccf4c0e4-50e1-428b-9865-0d85f82256d4
        number:
          type: string
          description: The brokerage account number, masked for display.
          example: '********1234'
        name:
          type: string
          description: The brokerage account name.
          example: Individual Brokerage
        type:
          type: string
          description: The brokerage account type.
          example: CASH
        link:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/snaptrade-link'
      required:
        - id
        - number
        - name
        - type
        - link

    snaptrade-link:
      type: object
      description: Data regarding the linkage between a SnapTrade account and a portfolio.
      properties:
        mode:
          $ref: '#/components/schemas/enum-snaptrade-link-mode'
          description: The strategy used when importing positions into the linked portfolio.
        status:
          $ref: '#/components/schemas/enum-snaptrade-link-status'
          description: The status of the link.
        progress:
          type: number
          description: If the status indicates work in progress, this is the percent complete as a whole number.
          example: 100
        timestamp:
          type: string
          description: The timestamp of the most recent status update.
          format: date-time
          example: '2026-05-28T12:30:00.000Z'
        advice:
          type: string
          description: Additional guidance for resolving the link status, if present.
          example: Reconnect the brokerage account to continue synchronization.
      required:
        - status
        - progress
        - timestamp

    snaptrade-account-link-snapshot:
      type: object
      description: Data regarding the status of a link between a SnapTrade account and a portfolio.
      properties:
        user:
          type: string
          description: The identifier of the authorized user.
          example: 01748dd1-5d6d-4ae4-91b0-4e39e80c2b35
        portfolio:
          type: string
          description: The identifier of the linked portfolio.
          format: uuid
          example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
        connection:
          type: string
          description: The SnapTrade identifier for the brokerage connection.
          example: 147e7af9-f2fd-4e1d-b0c2-05059f03db89
        account:
          type: string
          description: The SnapTrade identifier for the brokerage account.
          example: ccf4c0e4-50e1-428b-9865-0d85f82256d4
        status:
          $ref: '#/components/schemas/enum-snaptrade-link-status'
          description: The status of the link.
        progress:
          type: number
          description: If the status indicates work in progress, this is the percent complete as a whole number.
          example: 100
        timestamp:
          type: string
          description: The timestamp of the most recent status update, if present.
          format: date-time
          example: '2026-05-28T12:30:00.000Z'
      required:
        - user
        - portfolio
        - connection
        - account
        - status
        - progress

    snaptrade-linking-report:
      type: object
      description: Data returned by a SnapTrade linking operation which could add or remove portfolios.
      properties:
        brokerages:
          type: array
          description: SnapTrade brokerages and linked account metadata.
          items:
            $ref: '#/components/schemas/snaptrade-brokerage'
        portfolios:
          type: object
          description: Portfolios saved or deleted by the linking operation.
          properties:
            saved:
              type: array
              description: Portfolios created or updated by the linking operation.
              items:
                $ref: '#/components/schemas/portfolio'
            deleted:
              type: array
              description: Portfolios deleted by the linking operation.
              items:
                $ref: '#/components/schemas/portfolio'
          required:
            - saved
            - deleted
      required:
        - brokerages
        - portfolios

    enum-position-summary-frame:
      type: string
      enum:
        - YEARLY
        - QUARTERLY
        - MONTHLY
        - YTD

    enum-snaptrade-link-mode:
      type: string
      enum:
        - STANDARD
        - LIMITED

    enum-snaptrade-link-status:
      type: string
      enum:
        - WAITING
        - LINKING
        - LINKED
        - REFRESHING
        - FAILED

servers:
  - url: https://portfolio-test.aws.barchart.com/v1
    description: Hostname for test environment.
  - url: https://portfolio.aws.barchart.com/v1
    description: Hostname for production environment.

tags:
  - name: Instrument
  - name: Portfolio
  - name: SnapTrade
  - name: Service
  - name: Values

paths:
  /instruments/{symbol}:
    get:
      summary: Resolves an instrument.
      description: Resolves an instrument, optionally for a specific day or closing price.
      tags:
        - Instrument
      security:
        - JWT: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: The symbol used to resolve the instrument.
          schema:
            type: string
            example: AAPL
        - name: day
          in: query
          required: false
          description: The day used for symbol resolution.
          schema:
            type: string
            format: date
            example: '2026-05-28'
        - name: closing
          in: query
          required: false
          description: If true, resolves the closing price for the requested day.
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Instrument resolution result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/instrument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios:
    post:
      summary: Creates a new portfolio.
      description: Creates a new portfolio for the current user.
      tags:
        - Portfolio
      security:
        - JWT: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portfolio-create'
      responses:
        '200':
          description: The newly created portfolio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portfolio'
        '400':
          $ref: '#/components/responses/SchemaError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}:
    get:
      summary: Returns one (or more) portfolios, owned by the current user.
      description: Returns one (or more) portfolios, owned by the current user. If the user has no portfolios, an empty array is returned.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio-or-wildcard'
      responses:
        '200':
          description: An array of portfolios (with zero, one, or many items).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/portfolio'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Updates a portfolio.
      description: Updates a portfolio.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portfolio-update'
      responses:
        '200':
          description: The updated portfolio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portfolio'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Deletes a portfolio and everything associated with the portfolio, including all positions, transactions, and summaries.
      description: Deletes a portfolio and everything associated with the portfolio, including all positions, transactions, and summaries.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
      responses:
        '200':
          description: Deletion of portfolio successful. No data is returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}/positions/{position}:
    get:
      summary: Returns positions, optionally filtering for portfolio.
      description: Returns positions, optionally filtering for portfolio.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio-or-wildcard'
        - $ref: '#/components/parameters/position-or-wildcard'
        - name: open
          in: query
          required: false
          description: If true, only open positions are returned.
          schema:
            type: boolean
            example: true
        - name: symbol
          in: query
          required: false
          description: Filters positions by instrument symbol.
          schema:
            type: string
            example: AAPL
        - name: includePreviousPrice
          in: query
          required: false
          description: If true, includes the previous price in returned position data.
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: An array of positions (with zero, one, or many items).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/position'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Updates a position.
      description: Updates a position (e.g. defaults like automatic re-investment).
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/position-update'
      responses:
        '200':
          description: The updated position.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/position'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Deletes a position and everything associated with the position — including all transactions, summaries, etc.
      description: Deletes a position and everything associated with the position — including all transactions, summaries, etc.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position'
      responses:
        '200':
          description: Positions affected by the delete operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transaction-mutate-result'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      summary: Moves a position to another portfolio.
      description: Moves a position from the current portfolio to a target portfolio.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position'
        - name: target
          in: query
          required: true
          description: The identifier of the destination portfolio.
          schema:
            type: string
            format: uuid
            example: 6ce12dec-bba9-4bf3-b865-8a4eab6e43a3
      responses:
        '200':
          description: Positions affected by the move operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transaction-mutate-result'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}/summaries/{position}:
    get:
      summary: Returns position summaries.
      description: Returns summaries for a portfolio or a single position.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio-or-wildcard'
        - $ref: '#/components/parameters/position-or-wildcard'
        - name: frames
          in: query
          required: false
          description: Comma-separated summary frame codes.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/enum-position-summary-frame'
        - name: periods
          in: query
          required: false
          description: Number of periods to retrieve.
          schema:
            type: number
            example: 4
        - name: start
          in: query
          required: false
          description: First summary start date to retrieve.
          schema:
            type: string
            format: date
            example: '2026-01-01'
      responses:
        '200':
          description: An array of position summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/position-summary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}/values/availability:
    get:
      summary: Returns valuation availability.
      description: Returns valuation availability for a portfolio and its positions.
      tags:
        - Values
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
      responses:
        '200':
          description: Valuation availability result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/valuations-availability-result'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}/positions/{position}/transactions:
    post:
      summary: Creates a new transaction.
      description: Creates a new transaction for the current user.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - name: position
          in: path
          required: true
          description: The identifier of the position to which the transaction will be added. Use "new" to create a new position.
          schema:
            type: string
            example: 96af2dc6-2236-4a82-84c2-bff969389e00
        - name: type
          in: query
          required: true
          description: The type of transaction to create.
          schema:
            $ref: '#/components/schemas/enum-transaction-create-type'
        - name: suppressCorporateActions
          in: query
          required: false
          description: If true, suppresses generated corporate action transactions.
          schema:
            type: boolean
            example: false
        - name: strictInstrumentResolution
          in: query
          required: false
          description: If true, requires strict instrument resolution.
          schema:
            type: boolean
            example: true
        - name: correctInvalidTicks
          in: query
          required: false
          description: If true, corrects invalid tick data during transaction processing.
          schema:
            type: boolean
            example: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/transaction-create'
      responses:
        '200':
          description: An object listing the positions affected by the new transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transaction-mutate-result'
        '400':
          $ref: '#/components/responses/SchemaError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /portfolios/{portfolio}/positions/{position}/transactions/{sequence}:
    get:
      summary: Returns one or more transactions.
      description: Returns one transaction by sequence number, or all transactions when sequence is an asterisk (*).
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position-or-wildcard'
        - $ref: '#/components/parameters/sequence-or-wildcard'
      responses:
        '200':
          description: An array of transactions (with zero, one, or many items).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/transaction'
        '400':
          $ref: '#/components/responses/SchemaError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Edits or switches a transaction.
      description: Edits a transaction, or switches the reinvestment strategy when the switch query parameter is supplied.
      tags:
        - Portfolio
      security:
        - JWT: []
      parameters:
        - $ref: '#/components/parameters/portfolio'
        - $ref: '#/components/parameters/position'
        - $ref: '#/components/parameters/sequence'
        - name: type
          in: query
          required: false
          description: The transaction type to use when editing the transaction.
          schema:
            $ref: '#/components/schemas/enum-transaction-type'
        - name: switch
          in: query
          required: false
          description: The target transaction type when switching reinvestment strategy.
          schema:
            $ref: '#/components/schemas/enum-transaction-type'
