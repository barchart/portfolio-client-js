            format: date
            example: '2026-01-01'
        - name: echoEnd
          in: query
          required: false
          description: Last date to echo in mutation results.
          schema:
            type: string
            format: date
            example: '2026-05-28'
      responses:
        '200':
          description: An object listing the positions affected by the transaction deletion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transaction-mutate-result'
